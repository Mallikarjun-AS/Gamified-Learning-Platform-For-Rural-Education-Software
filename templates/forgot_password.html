{% extends "base.html" %}
{% block content %}

<style>
    .forgot-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 160px);
        padding: 2rem 1rem;
    }

    .forgot-box {
        width: 100%;
        max-width: 440px;
        background: rgba(15, 8, 48, 0.75);
        border: 1px solid rgba(255, 215, 0, 0.18);
        border-radius: 28px;
        padding: 3rem 2.5rem;
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        animation: popIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes popIn {
        from { opacity: 0; transform: translateY(40px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .forgot-icon {
        text-align: center;
        font-size: 3rem;
        margin-bottom: 0.5rem;
        filter: drop-shadow(0 0 16px var(--electric-blue));
    }

    .forgot-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 2.2rem;
        font-weight: 900;
        text-align: center;
        background: linear-gradient(135deg, #fff 0%, var(--electric-blue) 60%, var(--emerald) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.4rem;
    }

    .forgot-sub {
        text-align: center;
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 2.2rem;
    }

    .form-group {
        margin-bottom: 1.3rem;
    }

    .form-label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.5rem;
    }

    .input-wrap {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.1rem;
    }

    .form-input {
        width: 100%;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,215,0,0.15);
        border-radius: 14px;
        padding: 0.9rem 1rem 0.9rem 3rem;
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        font-size: 0.95rem;
        outline: none;
        transition: all 0.3s;
    }

    .form-input:focus {
        border-color: var(--electric-blue);
        background: rgba(0,195,255,0.04);
        box-shadow: 0 0 0 3px rgba(0,195,255,0.1);
    }

    .btn-reset {
        width: 100%;
        padding: 1rem;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--electric-blue) 0%, var(--emerald) 100%);
        color: #001a10;
        font-family: 'Outfit', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        box-shadow: 0 6px 28px rgba(0,195,255,0.35);
        transition: all 0.25s;
        margin-top: 0.5rem;
    }

    .btn-reset::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s;
    }

    .btn-reset:hover::before { left: 100%; }
    .btn-reset:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(0,195,255,0.5);
    }

    .back-link {
        text-align: center;
        margin-top: 1.8rem;
        font-size: 0.85rem;
        color: var(--muted);
    }

    .back-link a {
        color: var(--electric-blue);
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="forgot-wrapper">
    <div class="forgot-box">
        <div class="forgot-icon">🔐</div>
        <h2 class="forgot-title" data-translate="reset_password">Reset Password</h2>
        <p class="forgot-sub" data-translate="reset_subtitle">Enter your email to receive reset instructions</p>

        <form method="POST">
            <div class="form-group">
                <label class="form-label" data-translate="email_address">Email Address</label>
                <div class="input-wrap">
                    <span class="input-icon">📧</span>
                    <input class="form-input" type="email" name="email" placeholder="student@school.in" required autocomplete="email">
                </div>
            </div>

            <button type="submit" class="btn-reset" data-translate="send_reset">
                ✨ Send Reset Link
            </button>
        </form>

        <p class="back-link">
            <span data-translate="remember_password">Remember your password?</span> 
            <a href="{{ url_for('login') }}" data-translate="back_to_login">Back to Login →</a>
        </p>
    </div>
</div>

{% endblock %}
